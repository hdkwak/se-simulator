metadata:
  recipe_type: measurement
  version: '1.0'
  created: '2026-03-14T01:39:15.212329+00:00'
  author: ''
  description: 'SiO2 on Si — thickness fitting example'
  material_db_version: ''

forward_model:
  stack:
    inline:
      superstrate:
        name: Air
        source: library
        library_name: Air
      substrate:
        name: Si
        source: library
        library_name: Si
      layers:
      - name: SiO2 Layer
        type: uniform
        thickness_nm: 100.0
        material:
          name: SiO2
          source: library
          library_name: SiO2
  data_collection:
    aoi_deg: 65.0
    azimuth_deg: 0.0
    polarizer_angle_deg: 45.0
    analyzer_angle_deg: 45.0
    compensator_angle_deg: 0.0
    wavelength_start_nm: 300.0
    wavelength_end_nm: 800.0
    wavelength_step_nm: 2.0
  simulation_conditions:
    n_harmonics_x: 5
    n_harmonics_y: 5
    li_factorization: true
    engine_override: auto
  system_config_ref: ''

floating_parameters:
- name: SiO2 thickness
  target_field: layers[0].thickness_nm
  min: 10.0
  max: 500.0
  initial: 100.0
  step: 1.0
  units: nm

fitting_configuration:
  fitting_mode: tmm_direct
  fit_signals:
  - psi
  - delta
  weights: uniform
  optimizer: levenberg_marquardt
  max_iterations: 200
  convergence_tolerance: 1.0e-6
  gradient_step: 1.0e-4

library_reference:
  library_file: ''

output_options:
  save_recipe_with_results: true
  save_fit_report: true
  save_fitted_spectrum: true
