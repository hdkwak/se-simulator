  author: ''
  description: 'SiO2 on Si — thickness fitting example'
  material_db_version: ''

forward_model:
  sample:
    inline:
      superstrate:
        library_name: Air
      substrate:
        library_name: Si
      layers:
      - name: SiO2 Layer
        type: uniform
        thickness_nm: 100.0
        material:
          library_name: SiO2
  simulation_conditions:
    wavelength_start_nm: 300.0
    wavelength_end_nm: 800.0
    wavelength_step_nm: 2.0
    aoi_degrees: 65.0
    azimuth_degrees: 0.0
    polarizer_degrees: 45.0
